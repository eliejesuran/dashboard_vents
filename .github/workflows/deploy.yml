name: Deploy to Infomaniak

on:
  push:
    branches: [main]
    paths: [index.html]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload index.html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          local-dir: ./
          # "include" n'est pas un paramètre reconnu par cette action (v4.3.5) — il ne
          # restreignait donc rien : tout le dépôt était synchronisé (sauf les exclusions
          # par défaut), d'où le dépassement de quota FTP en ajoutant models/yolo26n.onnx
          # (~10 Mo, chargé depuis GitHub directement, cf. index.html — pas déployé ici).
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/models/**
